<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Dataset Builder (AutoSave + Resume)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body { font-family: Arial; background:#0f172a; color:white; padding:20px; }
h1 { text-align:center; }

input, textarea {
  width:100%; padding:10px; margin:10px 0;
  border-radius:6px; border:none;
}

button {
  padding:10px 20px; margin:5px;
  border:none; border-radius:6px;
  cursor:pointer; font-weight:bold;
}

.btn { background:#22c55e; }
.download { background:#3b82f6; }

pre {
  background:#1e293b; padding:15px;
  border-radius:8px; max-height:400px;
  overflow:auto;
}

.progress { margin-top:10px; font-size:14px; }
</style>
</head>

<body>

<h1>📄 AI Dataset Builder (AutoSave Engine)</h1>

<input type="password" id="apiKey" placeholder="Enter SambaNova API Key">
<input type="file" id="pdfUpload" accept="application/pdf">

<textarea id="rawText" placeholder="Extracted preview..."></textarea>

<button class="btn" onclick="extractPDF()">Extract PDF</button>
<button class="btn" onclick="runPipeline()">Run / Resume Pipeline</button>
<button class="download" onclick="downloadJSON()">Download JSON</button>

<div class="progress" id="progress"></div>
<pre id="output">Output will appear here...</pre>

<script>
let pages = [];
let finalData = [];
let progressIndex = 0;

/* -------- Load Saved Progress -------- */
function loadProgress() {
  const saved = localStorage.getItem("dataset_progress");
  if (saved) {
    const data = JSON.parse(saved);
    finalData = data.results || [];
    progressIndex = data.index || 0;
  }
}

/* -------- Save Progress -------- */
function saveProgress() {
  localStorage.setItem("dataset_progress", JSON.stringify({
    index: progressIndex,
    results: finalData
  }));
}

/* -------- Extract PDF -------- */
async function extractPDF() {
  const file = document.getElementById("pdfUpload").files[0];
  if (!file) return alert("Upload PDF");

  const reader = new FileReader();

  reader.onload = async function () {
    const pdf = await pdfjsLib.getDocument(
      new Uint8Array(this.result)
    ).promise;

    pages = [];

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();

      let text = "";
      content.items.forEach(item => text += item.str + " ");

      pages.push(text);
    }

    document.getElementById("progress").innerText =
      `PDF Loaded: ${pages.length} pages`;
  };

  reader.readAsArrayBuffer(file);
}

/* -------- Group Pages -------- */
function groupPages() {
  let size = pages.length > 50 ? 2 : 3;
  let groups = [];

  for (let i = 0; i < pages.length; i += size) {
    groups.push(pages.slice(i, i + size).join(" "));
  }

  return groups;
}

/* -------- API -------- */
async function callAI(model, prompt, apiKey) {
  const res = await fetch("https://api.sambanova.ai/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + apiKey,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model,
      messages: [
        { role: "system", content: "You are a structured data AI." },
        { role: "user", content: prompt }
      ],
      temperature: 0.2,
      max_tokens: 3000
    })
  });

  const data = await res.json();
  return data.choices?.[0]?.message?.content || "";
}

/* -------- Retry -------- */
async function retryCall(fn, attempts = 3) {
  for (let i = 1; i <= attempts; i++) {
    try {
      const res = await fn();
      if (res) return res;
    } catch {}
    await new Promise(r => setTimeout(r, 1000 * i));
  }
  return "";
}

/* -------- JSON Fix -------- */
function safeParse(jsonStr) {
  try {
    return JSON.parse(jsonStr);
  } catch {
    try {
      return JSON.parse(jsonStr.replace(/,\s*}/g, "}").replace(/,\s*]/g, "]"));
    } catch {
      return { questions: [] };
    }
  }
}

/* -------- Process Chunk -------- */
async function processChunk(chunk, apiKey) {

  const cleaned = await retryCall(() =>
    callAI("Meta-Llama-3.1-8B-Instruct", `Clean OCR:\n${chunk}`, apiKey)
  );

  const structured = await retryCall(() =>
    callAI("Qwen2.5-32B-Instruct", `Extract MCQs JSON:\n${cleaned}`, apiKey)
  );

  const final = await retryCall(() =>
    callAI("Meta-Llama-3.3-70B-Instruct", `
Convert to dataset JSON:
{"questions":[{"id":"","type":"","level":"","difficulty":"","question":"","options":["","","",""],"correct":0,"explanation":""}]}
STRICT JSON ONLY
INPUT:
${structured}
`, apiKey)
  );

  const clean = final.replace(/```json|```/g, "");
  const parsed = safeParse(clean);

  return parsed.questions || [];
}

/* -------- Pipeline -------- */
async function runPipeline() {
  loadProgress();

  const apiKey = document.getElementById("apiKey").value;
  if (!apiKey || pages.length === 0) {
    return alert("Missing API key or PDF");
  }

  const groups = groupPages();

  for (let i = progressIndex; i < groups.length; i++) {
    progressIndex = i;

    document.getElementById("progress").innerText =
      `Processing chunk ${i+1}/${groups.length}`;

    const res = await processChunk(groups[i], apiKey);

    finalData.push(...res);

    saveProgress();
  }

  const finalJSON = JSON.stringify({
    subject: "Business Studies",
    subject_code: "BS",
    questions: finalData
  }, null, 2);

  document.getElementById("output").innerText = finalJSON;
  document.getElementById("progress").innerText = "✅ Completed";
}

/* -------- Download -------- */
function downloadJSON() {
  const data = localStorage.getItem("dataset_progress");
  if (!data) return alert("No data");

  const parsed = JSON.parse(data);

  const blob = new Blob([JSON.stringify({
    subject:"Business Studies",
    subject_code:"BS",
    questions: parsed.results
  }, null, 2)], { type:"application/json" });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "dataset.json";
  a.click();
}
</script>

</body>
</html>
